version: '3.8'

services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    ports:
      - "5672:5672" # AMQP port
    environment:
      - ACCEPT_EULA=Y
      - CONFIG_PATH=/ServiceBus_Emulator/ConfigFiles/Config.json